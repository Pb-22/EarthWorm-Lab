services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ew-ui
    hostname: ew-ui
    init: true
    ports:
      - "127.0.0.1:23456:5000"
    volumes:
      - ./pcaps:/pcaps
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    command: python3 /opt/ew-lab/app.py
    restart: unless-stopped

  ew-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ew-router
    hostname: ew-router
    init: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      ew_internal:
        ipv4_address: 10.1.1.254
      ew_public:
        ipv4_address: 203.0.113.254
    command: >
      sh -lc "
      sysctl -w net.ipv4.ip_forward=1;
      sysctl -w net.ipv4.conf.all.rp_filter=0;
      sysctl -w net.ipv4.conf.default.rp_filter=0;
      iptables -P FORWARD ACCEPT || true;
      sleep infinity
      "
    restart: unless-stopped

  ew-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ew-server
    hostname: ew-server
    init: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
    networks:
      ew_public:
        ipv4_address: 203.0.113.10
    command: sleep infinity
    restart: unless-stopped

  ew-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ew-client
    hostname: ew-client
    init: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
    networks:
      ew_internal:
        ipv4_address: 10.1.1.5
    command: sleep infinity
    restart: unless-stopped

  target-web:
    image: nginx:alpine
    container_name: ew-target-web
    hostname: ew-target-web
    networks:
      ew_internal:
        ipv4_address: 10.1.1.50
    volumes:
      - ./webroot:/usr/share/nginx/html:ro
    restart: unless-stopped

  ew-capture:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ew-capture
    init: true
    network_mode: service:ew-router
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./pcaps:/pcaps
    command: sleep infinity
    restart: unless-stopped

networks:
  ew_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.1.0/24

  ew_public:
    driver: bridge
    ipam:
      config:
        - subnet: 203.0.113.0/24
